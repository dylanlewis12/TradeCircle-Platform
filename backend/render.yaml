# backend/render.yaml
services:
  - type: web
    name: tradecircle-api
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: ACCESS_SECRET
        sync: false
      - key: REFRESH_SECRET
        sync: false
      - key: FRONTEND_URL
        value: https://your-vercel-frontend.vercel.app
      - key: PORT
        value: 3000